feature.label = JDT Bridge
feature.provider_name = kaluchi

updateSiteName = JDT Bridge Update Site

description.text = Exposes Eclipse JDT SearchEngine, refactoring, diagnostics, and test runner \
over HTTP for use by AI coding assistants and CLI tools.\n\
\n\
Starts an HTTP server on a random port at Eclipse startup.\n\
Connection details are written to ~/.jdtbridge (port, auth token, PID, workspace).

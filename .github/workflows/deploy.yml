name: Deploy

on:
  push:
    tags: ['v*']

jobs:
  build:
    name: Build release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: cli/package-lock.json
          registry-url: https://registry.npmjs.org

      - run: cd cli && npm ci && npm test

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml', '**/*.target') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Build and test
        run: xvfb-run mvn clean verify -B -Pci
        env:
          MAVEN_OPTS: >-
            -Djdk.xml.totalEntitySizeLimit=0
            -Djdk.xml.maxGeneralEntitySizeLimit=0

      - name: Upload p2 repository
        uses: actions/upload-artifact@v4
        with:
          name: p2-repository
          path: site/target/repository/

      - name: Publish CLI to npm
        run: |
          cd cli
          VERSION="${GITHUB_REF_NAME#v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch gh-pages history
        run: |
          git fetch origin gh-pages:gh-pages || true
          mkdir -p site-content
          git worktree add site-content gh-pages || true

      - uses: actions/download-artifact@v4
        with:
          name: p2-repository
          path: new-release

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build composite site
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          mkdir -p site-content/releases/${VERSION}
          cp -r new-release/* site-content/releases/${VERSION}/

          CHILDREN=""
          CHILD_COUNT=0
          for dir in site-content/releases/*/; do
            if [ -d "$dir" ]; then
              rel=$(basename "$dir")
              CHILDREN="${CHILDREN}<child location=\"releases/${rel}\"/>"
              CHILD_COUNT=$((CHILD_COUNT + 1))
            fi
          done

          TIMESTAMP=$(date +%s000)

          generate_composite() {
            local type_class="$1"
            local pi_name="$2"
            cat <<XMLEOF
          <?xml version="1.0" encoding="UTF-8"?>
          <?${pi_name} version="1.0.0"?>
          <repository name="JDT Bridge Update Site" type="${type_class}" version="1.0.0">
            <properties size="2">
              <property name="p2.timestamp" value="${TIMESTAMP}"/>
              <property name="p2.compressed" value="false"/>
            </properties>
            <children size="${CHILD_COUNT}">
              ${CHILDREN}
            </children>
          </repository>
          XMLEOF
          }

          generate_composite \
            "org.eclipse.equinox.internal.p2.metadata.repository.CompositeMetadataRepository" \
            "compositeMetadataRepository" \
            > site-content/compositeContent.xml

          generate_composite \
            "org.eclipse.equinox.internal.p2.artifact.repository.CompositeArtifactRepository" \
            "compositeArtifactRepository" \
            > site-content/compositeArtifacts.xml

          cat > site-content/p2.index <<IDXEOF
          version=1
          metadata.repository.factory.order=compositeContent.xml,\!
          artifact.repository.factory.order=compositeArtifacts.xml,\!
          IDXEOF

      - name: Update landing page version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if [ -f site-content/index.html ]; then
            sed -i "s|<div class=\"version\">v[^<]*</div>|<div class=\"version\">v${VERSION}</div>|" site-content/index.html
          fi

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: site-content
          branch: gh-pages
          clean: false

  release:
    name: Create GitHub Release
    needs: [build, deploy]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create release
        run: gh release create "$GITHUB_REF_NAME" --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
